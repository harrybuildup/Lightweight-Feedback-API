<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { text-align: center; padding: 2rem; }

    h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 0.5rem; }
    p  { color: #6b7280; margin-bottom: 2.5rem; }

    .cards {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2rem 2.5rem;
      text-decoration: none;
      color: inherit;
      width: 200px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .card h2   { font-size: 1.1rem; color: #1a1a2e; margin-bottom: 0.4rem; }
    .card p    { font-size: 0.82rem; color: #6b7280; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📬 Feedback System</h1>
    <p>Choose where you want to go</p>
    <div class="cards">
      <a href="/feedback" class="card">
        <div class="icon">💬</div>
        <h2>Feedback</h2>
        <p>Submit your feedback</p>
      </a>
      <a href="/admin" class="card">
        <div class="icon">📊</div>
        <h2>Admin</h2>
        <p>View dashboard & analytics</p>
      </a>
    </div>
  </div>
</body>
</html>
