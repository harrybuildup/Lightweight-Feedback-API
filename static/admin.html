<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; letter-spacing: -0.02em; }
    header span {
      font-size: 0.8rem;
      background: #1e293b;
      color: #94a3b8;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1px solid #334155;
    }

    /* Metric Cards */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .metric-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .metric-card.blue::before  { background: #3b82f6; }
    .metric-card.amber::before { background: #f59e0b; }
    .metric-card.split::before { background: linear-gradient(90deg, #ef4444 50%, #22c55e 50%); }

    .metric-label  { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.5rem; }
    .metric-value  { font-size: 2rem; font-weight: 700; color: #f8fafc; line-height: 1; }
    .metric-sub    { font-size: 0.78rem; color: #64748b; margin-top: 0.4rem; }
    .metric-sub .neg { color: #f87171; }
    .metric-sub .pos { color: #4ade80; }

    /* Controls */
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls select {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      outline: none;
    }
    .controls select:focus { border-color: #3b82f6; }
    .controls label { font-size: 0.8rem; color: #64748b; }
    .count-badge {
      margin-left: auto;
      font-size: 0.8rem;
      color: #64748b;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
    }

    /* Feedback Table */
    .table-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead tr { background: #0f172a; border-bottom: 1px solid #334155; }
    thead th {
      padding: 0.85rem 1.25rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #475569;
      font-weight: 600;
    }
    tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263348; }
    tbody td { padding: 0.9rem 1.25rem; color: #cbd5e1; vertical-align: middle; }

    .email-cell { color: #94a3b8; font-size: 0.82rem; }
    .desc-cell  { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #94a3b8; }
    .stars-cell { color: #f59e0b; letter-spacing: 1px; font-size: 0.9rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .badge.bug     { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .badge.feature { background: #0c1a4a; color: #93c5fd; border: 1px solid #1e3a8a; }
    .badge.general { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    .date-cell { color: #475569; font-size: 0.8rem; white-space: nowrap; }

    /* Empty / loading state */
    .state-row td { text-align: center; padding: 3rem; color: #475569; font-size: 0.9rem; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #263348; color: #e2e8f0; }
  </style>
</head>
<body>

<header>
  <h1>📊 Feedback Dashboard</h1>
  <span id="lastUpdated">–</span>
</header>

<!-- Metric Cards -->
<div class="metrics">
  <div class="metric-card blue">
    <div class="metric-label">Total Feedback</div>
    <div class="metric-value" id="totalCount">–</div>
    <div class="metric-sub">submissions</div>
  </div>
  <div class="metric-card amber">
    <div class="metric-label">Average Rating</div>
    <div class="metric-value" id="avgRating">–</div>
    <div class="metric-sub">out of 5 stars</div>
  </div>
  <div class="metric-card split">
    <div class="metric-label">Sentiment</div>
    <div class="metric-value" id="sentimentVal">–</div>
    <div class="metric-sub">
      <span class="neg" id="negCount">0 negative</span>
      &nbsp;·&nbsp;
      <span class="pos" id="posCount">0 positive</span>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <label>Filter by rating:</label>
  <select id="filterRating">
    <option value="all">All ratings</option>
    <option value="1">★ 1 star</option>
    <option value="2">★★ 2 stars</option>
    <option value="3">★★★ 3 stars</option>
    <option value="4">★★★★ 4 stars</option>
    <option value="5">★★★★★ 5 stars</option>
  </select>
  <label>Sort by:</label>
  <select id="sortOrder">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="rating_high">Rating: high → low</option>
    <option value="rating_low">Rating: low → high</option>
  </select>
  <button class="refresh-btn" onclick="loadFeedback()">↻ Refresh</button>
  <span class="count-badge" id="shownCount">0 entries</span>
</div>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Category</th>
        <th>Rating</th>
        <th>Description</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr class="state-row"><td colspan="5"><span class="spinner"></span> Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API = '/feedback';
  let allFeedback = [];

  const ERROR_MESSAGES = {
    0:   'Cannot reach the server. Make sure the backend is running.',
    404: 'No feedback entries found yet.',
    422: 'The server could not process the request (422 Unprocessable Entity).',
    500: 'An internal server error occurred (500). Try again later.',
  };

  function showError(status) {
    const msg = ERROR_MESSAGES[status] || `Unexpected error (HTTP ${status}). Please try again.`;
    const icon = status === 404 ? '📭' : '⚠️';
    document.getElementById('tableBody').innerHTML =
      `<tr class="state-row"><td colspan="5">${icon} ${msg}</td></tr>`;
    document.getElementById('lastUpdated').textContent = 'Failed to load';
  }

  async function loadFeedback() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr class="state-row"><td colspan="5"><span class="spinner"></span> Loading...</td></tr>';
    try {
      const res = await fetch(API, {
        headers: { 'Accept': 'application/json' }
      });

      if (res.status === 404) {
        allFeedback = [];
        updateMetrics();
        renderTable();
        return;
      }

      if (!res.ok) {
        showError(res.status);
        return;
      }

      const data = await res.json();

      if (!Array.isArray(data)) {
        showError(0);
        return;
      }

      allFeedback = data;
      updateMetrics();
      renderTable();
      document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    } catch (err) {
      // Network failure, CORS block, or server completely down
      showError(0);
    }
  }

  function updateMetrics() {
    const total = allFeedback.length;
    document.getElementById('totalCount').textContent = total;
    if (total === 0) {
      document.getElementById('avgRating').textContent = '–';
      document.getElementById('sentimentVal').textContent = '–';
      document.getElementById('negCount').textContent = '0 negative';
      document.getElementById('posCount').textContent = '0 positive';
      return;
    }
    const avg = allFeedback.reduce((s, f) => s + f.rating, 0) / total;
    document.getElementById('avgRating').textContent = avg.toFixed(1);
    const neg = allFeedback.filter(f => f.rating <= 2).length;
    const pos = allFeedback.filter(f => f.rating >= 4).length;
    const pct = Math.round((pos / total) * 100);
    document.getElementById('sentimentVal').textContent = pct + '%';
    document.getElementById('negCount').textContent = neg + ' negative';
    document.getElementById('posCount').textContent = pos + ' positive';
  }

  function formatDate(isoString) {
    if (!isoString) return '—';
    return new Date(isoString).toLocaleString(undefined, {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderTable() {
    const filterVal = document.getElementById('filterRating').value;
    const sortVal   = document.getElementById('sortOrder').value;
    let data = [...allFeedback];

    // Filter
    if (filterVal !== 'all') {
      data = data.filter(f => f.rating === parseInt(filterVal));
    }

    // Sort
    if      (sortVal === 'newest')      data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    else if (sortVal === 'oldest')      data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    else if (sortVal === 'rating_high') data.sort((a, b) => b.rating - a.rating);
    else if (sortVal === 'rating_low')  data.sort((a, b) => a.rating - b.rating);

    document.getElementById('shownCount').textContent =
      data.length + ' entr' + (data.length === 1 ? 'y' : 'ies');

    const tbody = document.getElementById('tableBody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="5">No feedback matches your filters.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(f => `
      <tr>
        <td class="email-cell">${escHtml(f.email)}</td>
        <td><span class="badge ${escHtml(f.category)}">${escHtml(f.category)}</span></td>
        <td class="stars-cell">${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}</td>
        <td class="desc-cell" title="${escHtml(f.description)}">${escHtml(f.description)}</td>
        <td class="date-cell">${formatDate(f.created_at)}</td>
      </tr>
    `).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('filterRating').addEventListener('change', renderTable);
  document.getElementById('sortOrder').addEventListener('change', renderTable);

  loadFeedback();
</script>
</body>
</html>
