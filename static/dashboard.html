<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .chart-container h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }
        
        .filters button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        
        .filters button:hover {
            background: #764ba2;
        }
        
        .feedback-list {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .feedback-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        
        .feedback-item:last-child {
            border-bottom: none;
        }
        
        .feedback-content {
            flex: 1;
        }
        
        .feedback-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .feedback-email {
            font-weight: 600;
            color: #333;
        }
        
        .feedback-category {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .category-bug {
            background: #fee;
            color: #c33;
        }
        
        .category-feature {
            background: #eef;
            color: #33c;
        }
        
        .category-general {
            background: #efe;
            color: #3c3;
        }
        
        .feedback-rating {
            color: #ffc107;
            margin-left: 10px;
        }
        
        .feedback-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .feedback-date {
            font-size: 0.85em;
            color: #999;
        }
        
        .delete-btn {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        function Dashboard() {
            const [stats, setStats] = useState(null);
            const [feedback, setFeedback] = useState([]);
            const [category, setCategory] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const chartRef = useRef(null);
            const ratingChartRef = useRef(null);
            let chartInstance = null;
            let ratingChartInstance = null;
            
            useEffect(() => {
                fetchStats();
                fetchFeedback();
            }, []);
            
            const fetchStats = async () => {
                try {
                    const response = await fetch('/api/feedback/stats');
                    const data = await response.json();
                    setStats(data);
                } catch (err) {
                    setError('Failed to load stats');
                }
            };
            
            const fetchFeedback = async () => {
                try {
                    setLoading(true);
                    const url = category ? `/api/feedback?category=${category}` : '/api/feedback';
                    const response = await fetch(url);
                    if (response.status === 404) {
                        setFeedback([]);
                    } else {
                        const data = await response.json();
                        setFeedback(data);
                    }
                    setError(null);
                } catch (err) {
                    setError('Failed to load feedback');
                    setFeedback([]);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleCategoryFilter = (e) => {
                setCategory(e.target.value);
            };
            
            const handleFilterApply = () => {
                fetchFeedback();
            };
            
            const handleDeleteFeedback = async (id) => {
                if (!window.confirm('Are you sure you want to delete this feedback?')) return;
                try {
                    const response = await fetch(`/api/feedback/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        fetchFeedback();
                        fetchStats();
                    } else {
                        alert('Failed to delete feedback');
                    }
                } catch (err) {
                    alert('Error deleting feedback');
                }
            };
            
            useEffect(() => {
                if (stats && chartRef.current) {
                    if (chartInstance) {
                        chartInstance.destroy();
                    }
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(stats.by_category),
                            datasets: [{
                                data: Object.values(stats.by_category),
                                backgroundColor: ['#ff6b6b', '#4ecdc4', '#45b7d1'],
                                borderColor: '#fff',
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                }
                
                return () => {
                    if (chartInstance) {
                        chartInstance.destroy();
                    }
                };
            }, [stats]);
            
            useEffect(() => {
                if (feedback.length > 0 && ratingChartRef.current) {
                    if (ratingChartInstance) {
                        ratingChartInstance.destroy();
                    }
                    const ratingCounts = [0, 0, 0, 0, 0];
                    feedback.forEach(f => {
                        ratingCounts[f.rating - 1]++;
                    });
                    
                    const ctx = ratingChartRef.current.getContext('2d');
                    ratingChartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['1 Star', '2 Stars', '3 Stars', '4 Stars', '5 Stars'],
                            datasets: [{
                                label: 'Rating Count',
                                data: ratingCounts,
                                backgroundColor: '#667eea',
                                borderColor: '#667eea',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false }
                            },
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }
                
                return () => {
                    if (ratingChartInstance) {
                        ratingChartInstance.destroy();
                    }
                };
            }, [feedback]);
            
            return (
                <div className="container">
                    <div className="header">
                        <h1>📊 Feedback Dashboard</h1>
                        <p>Real-time feedback analytics and management</p>
                    </div>
                    
                    {error && <div className="error">{error}</div>}
                    
                    {stats && (
                        <div className="stats-grid">
                            <div className="stat-card">
                                <h3>Total Feedback</h3>
                                <div className="value">{stats.total}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Average Rating</h3>
                                <div className="value">⭐ {stats.average_rating}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Bug Reports</h3>
                                <div className="value">{stats.by_category.bug || 0}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Feature Requests</h3>
                                <div className="value">{stats.by_category.feature || 0}</div>
                            </div>
                        </div>
                    )}
                    
                    <div className="charts-grid">
                        {stats && (
                            <div className="chart-container">
                                <h3>Feedback by Category</h3>
                                <canvas ref={chartRef}></canvas>
                            </div>
                        )}
                        {feedback.length > 0 && (
                            <div className="chart-container">
                                <h3>Rating Distribution</h3>
                                <canvas ref={ratingChartRef}></canvas>
                            </div>
                        )}
                    </div>
                    
                    <div className="filters">
                        <select value={category} onChange={handleCategoryFilter}>
                            <option value="">All Categories</option>
                            <option value="bug">Bug</option>
                            <option value="feature">Feature</option>
                            <option value="general">General</option>
                        </select>
                        <button onClick={handleFilterApply}>Apply Filter</button>
                        <button onClick={() => { setCategory(''); setFeedback([]); }}>Clear</button>
                    </div>
                    
                    <div className="feedback-list">
                        {loading ? (
                            <div className="loading">Loading feedback...</div>
                        ) : feedback.length === 0 ? (
                            <div className="no-data">No feedback found</div>
                        ) : (
                            feedback.map((item) => (
                                <div key={item.id} className="feedback-item">
                                    <div className="feedback-content">
                                        <div className="feedback-header">
                                            <span className="feedback-email">{item.email}</span>
                                            <span className={`feedback-category category-${item.category}`}>
                                                {item.category}
                                            </span>
                                            <span className="feedback-rating">
                                                {'⭐'.repeat(item.rating)}
                                            </span>
                                        </div>
                                        <p className="feedback-description">{item.description}</p>
                                        <p className="feedback-date">
                                            {new Date(item.created_at).toLocaleString()}
                                        </p>
                                    </div>
                                    <button 
                                        className="delete-btn"
                                        onClick={() => handleDeleteFeedback(item.id)}
                                    >
                                        Delete
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
